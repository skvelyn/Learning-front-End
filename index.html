<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Blog Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="blog-card">
        <div class="card-image">
            <img src="resources/Cactus.jpg" alt="Cactus Minimalist">
        </div>

        <div class="card-content">
            <span class="category-tag">Design</span>

            <h3>Embracing Minimalism</h3>
            <p>From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>

            <hr>
            <footer class="card-footer">
                <span class="author-name">Annie Spratt</span>
            </footer>
        </div>
    </article>
</body>
</html>
